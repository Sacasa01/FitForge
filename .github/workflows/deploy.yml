name: Build & Deploy

on:
    push:
        branches: [main]

permissions:
    contents: read
    packages: write

env:
    REGISTRY: ghcr.io
    IMAGE: ghcr.io/${{ github.repository_owner }}/fitforge

jobs:
    test:
        name: Test
        runs-on: ubuntu-latest

        services:
            mysql:
                image: mysql:8.0
                env:
                    MYSQL_ROOT_PASSWORD: root
                    MYSQL_DATABASE: app_test
                ports: ['3306:3306']
                options: >-
                    --health-cmd="mysqladmin ping"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=3

        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.4'
                  extensions: mbstring, intl, pdo_mysql, zip
                  coverage: none

            - name: Cache Composer
              uses: actions/cache@v4
              with:
                  path: vendor
                  key: composer-${{ hashFiles('composer.lock') }}
                  restore-keys: composer-

            - name: Install dependencies
              run: composer install --prefer-dist --no-interaction

    deploy:
        name: Deploy
        needs: test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Login to ghcr.io
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.IMAGE }}
                  tags: |
                      type=sha,prefix=sha-
                      type=raw,value=latest

            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=registry,ref=${{ env.IMAGE }}:latest
                  cache-to: type=inline


            -   name: Bypass Cloudflare for GitHub Action
                uses: xiaotianxt/bypass-cloudflare-for-github-action@v2.1.0
                with:
                    cf_account_id: ${{ secrets.CF_ACCOUNT_ID }}
                    cf_zone_id: ${{ secrets.CF_ZONE_ID }}
                    cf_api_token: ${{ secrets.CF_API_TOKEN }}
                    disable_bot_fight_mode: 'true'

            - name: Trigger Portainer stack webhook
              run: |
                  response_file="$(mktemp)"
                  status_code="$(
                      curl -sS -L \
                          --retry 3 \
                          --retry-delay 10 \
                          --retry-all-errors \
                          -o "$response_file" \
                          -w "%{http_code}" \
                          -X POST \
                          "${{ secrets.PORTAINER_WEBHOOK_URL }}"
                  )"

                  if [ "$status_code" -lt 200 ] || [ "$status_code" -ge 300 ]; then
                      echo "Portainer webhook failed with HTTP $status_code"
                      cat "$response_file"
                      exit 1
                  fi

                  echo "Portainer webhook accepted with HTTP $status_code"
